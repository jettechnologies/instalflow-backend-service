<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commission Disbursed - Instalflow</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jost:wght@100;400;500;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
    
    body {
      font-family: 'Jost', sans-serif;
      background-color: #0B0F1A;
      color: #9CA3AF;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .container {
      max-width: 600px;
      margin: 2rem auto;
      background-color: #111827;
      border: 1px solid #1F2937;
      border-radius: 24px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }
    .header {
      padding: 2.5rem 1.5rem 1rem;
      text-align: center;
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      color: #F9FAFB;
    }
    .logo-text span {
      color: #7C3AED;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      margin: 1.5rem auto;
      background-color: #10B981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }
    .content {
      padding: 0 2.5rem 2.5rem;
      text-align: center;
    }
    .title {
      font-weight: 700;
      font-size: 1.5rem;
      color: #F9FAFB;
      margin: 0.5rem 0;
    }
    .amount-badge {
      display: inline-block;
      margin: 1.5rem 0;
      padding: 1.5rem 3rem;
      background: #0B0F1A;
      border: 1px solid #1F2937;
      border-radius: 16px;
    }
    .amount-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.1rem;
    }
    .amount-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: #F9FAFB;
    }
    .data-grid {
      background: #0B0F1A;
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: left;
    }
    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid #1F2937;
    }
    .data-row:last-child {
      border-bottom: none;
    }
    .data-label {
      color: #9CA3AF;
      font-size: 0.875rem;
    }
    .data-value {
      color: #F9FAFB;
      font-weight: 600;
      font-size: 0.875rem;
    }
    .footer {
      background-color: #0B0F1A;
      border-top: 1px solid #1F2937;
      padding: 2rem;
      text-align: center;
    }
    .signature {
      font-size: 0.875rem;
      color: #9CA3AF;
    }
    .signature .product-name {
      color: #F9FAFB;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-text">Instal<span>flow</span></div>
      <div class="success-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
      </div>
      <h1 class="title">Commission Disbursed</h1>
    </div>
    
    <div class="content">
      <div class="amount-badge">
        <div class="amount-label">Earnings Sent</div>
        <div class="amount-value">${amount}</div>
      </div>
      
      <div class="data-grid">
        <div class="data-row">
          <span class="data-label">Referral:</span>
          <span class="data-value">${referredCompanyName}</span>
        </div>
        <div class="data-row">
          <span class="data-label">Reference:</span>
          <span class="data-value">${reference}</span>
        </div>
        <div class="data-row">
          <span class="data-label">Status:</span>
          <span class="data-value" style="color: #10B981;">Disbursed</span>
        </div>
      </div>
    </div>
    
    <div class="footer">
      <div class="signature">
        <p>The <span class="product-name">Instalflow</span> Team</p>
      </div>
    </div>
  </div>
</body>
</html>
