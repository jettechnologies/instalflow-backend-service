<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password - Instalflow</title>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; color: #1a202c; background-color: #f7fafc; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .content { padding: 40px; text-align: center; }
        .otp-box { background: #fff5f5; border-radius: 8px; padding: 20px; font-size: 32px; font-weight: 700; letter-spacing: 0.5em; margin: 24px 0; color: #c53030; text-indent: 0.5em; border: 1px dashed #feb2b2; }
        .footer { background: #f8fafc; padding: 20px; text-align: center; font-size: 13px; color: #a0aec0; }
        .highlight { color: #c53030; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h2 style="margin-top: 0;">Password Reset Code</h2>
            <p>We received a request to reset your password. Use the code below to proceed with the reset:</p>
            <div class="otp-box">{{otp}}</div>
            <p style="font-size: 14px; color: #718096;">This code is valid for <span class="highlight">10 minutes</span>. If you didn't request a password reset, you can safely ignore this email.</p>
        </div>
        <div class="footer">
            &copy; 2026 Instalflow Platform.
        </div>
    </div>
</body>
</html>
