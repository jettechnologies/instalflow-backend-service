<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}} - Instalflow</title>

    <style>
      body {
        font-family: "Jost", sans-serif;
        background: #0b0f1a;
        margin: 0;
        color: #9ca3af;
      }

      .container {
        max-width: 600px;
        margin: 32px auto;
        background: #111827;
        border-radius: 24px;
        border: 1px solid #1f2937;
        overflow: hidden;
      }

      .header {
        text-align: center;
        padding: 40px 24px 20px;
      }

      .logo {
        font-size: 1.6rem;
        font-weight: 700;
        color: #f9fafb;
      }

      .logo span {
        color: #7c3aed;
      }

      .title {
        color: #f9fafb;
        font-size: 1.6rem;
        font-weight: 700;
      }

      .status {
        font-weight: 700;
        margin-top: 10px;
        color: {{statusColor}};
      }

      .content {
        padding: 0 32px 32px;
      }

      .card {
        background: #0b0f1a;
        border-radius: 16px;
        padding: 20px;
        border: 1px solid #1f2937;
      }

      .row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #1f2937;
      }

      .row:last-child {
        border-bottom: none;
      }

      .label {
        color: #9ca3af;
      }

      .value {
        color: #f9fafb;
        font-weight: 600;
      }

      .note {
        margin-top: 20px;
        padding: 16px;
        border-radius: 12px;
        background: {{statusBg}};
        border: 1px solid #1f2937;
        color: #f9fafb;
      }

      .footer {
        text-align: center;
        padding: 24px;
        border-top: 1px solid #1f2937;
      }

      .footer span {
        color: #f9fafb;
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <div class="logo">Instal<span>flow</span></div>

        <h1 class="title">{{title}}</h1>

        <p class="status">Your account is now {{status}}</p>
      </div>

      <div class="content">
        <div class="card">
          <div class="row">
            <span class="label">Admin</span>
            <span class="value">{{adminName}}</span>
          </div>

          <div class="row">
            <span class="label">Processed By</span>
            <span class="value">{{requestedBy}}</span>
          </div>

          <div class="row">
            <span class="label">Status</span>
            <span class="value">{{status}}</span>
          </div>

          <div class="row">
            <span class="label">Processed At</span>
            <span class="value">{{processedAt}}</span>
          </div>
        </div>

        <div class="note">{{note}}</div>
      </div>

      <div class="footer">
        <p>The <span>Instalflow</span> Team</p>
      </div>
    </div>
  </body>
</html>
