<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Status Update - Instalflow</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jost:wght@100;400;500;700&display=swap');
    
    body {
      font-family: 'Jost', sans-serif;
      background-color: #0B0F1A;
      color: #9CA3AF;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .container {
      max-width: 600px;
      margin: 2rem auto;
      background-color: #111827;
      border: 1px solid #1F2937;
      border-radius: 24px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }
    .header {
      padding: 2.5rem 1.5rem 1rem;
      text-align: center;
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      color: #F9FAFB;
    }
    .logo-text span {
      color: #7C3AED;
    }
    .hero-icon {
      width: 64px;
      height: 64px;
      margin: 1.5rem auto;
      background-color: #7C3AED;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .content {
      padding: 0 2.5rem 2.5rem;
      text-align: center;
    }
    .title {
      font-weight: 700;
      font-size: 1.5rem;
      color: #F9FAFB;
      margin: 0.5rem 0;
    }
    .data-grid {
      background: #0B0F1A;
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: left;
    }
    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid #1F2937;
    }
    .data-row:last-child {
      border-bottom: none;
    }
    .data-label {
      color: #9CA3AF;
      font-size: 0.875rem;
    }
    .data-value {
      color: #F9FAFB;
      font-weight: 600;
      font-size: 0.875rem;
    }
    .footer {
      background-color: #0B0F1A;
      border-top: 1px solid #1F2937;
      padding: 2rem;
      text-align: center;
    }
    .signature {
      font-size: 0.875rem;
      color: #9CA3AF;
    }
    .signature .product-name {
      color: #F9FAFB;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-text">Instal<span>flow</span></div>
      <div class="hero-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"></path>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
        </svg>
      </div>
      <h1 class="title">Order Status Updated</h1>
    </div>
    
    <div class="content">
      <div class="message">
        <p>The status of your order <strong>#{{orderId}}</strong> has been updated to <strong>{{status}}</strong>.</p>
      </div>
      
      <div class="data-grid">
        <div class="data-row">
          <span class="data-label">Reference:</span>
          <span class="data-value">{{reference}}</span>
        </div>
        <div class="data-row">
          <span class="data-label">New Status:</span>
          <span class="data-value" style="color: #7C3AED;">{{status}}</span>
        </div>
      </div>
    </div>
    
    <div class="footer">
      <div class="signature">
        <p>The <span class="product-name">Instalflow</span> Team</p>
      </div>
    </div>
  </div>
</body>
</html>
