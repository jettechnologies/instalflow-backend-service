version: "3.9"

services:
  # =========================================================
  # API SERVICE
  # =========================================================
  api:
    image: instalflow-backend-service:latest

    build:
      context: .
      dockerfile: Dockerfile

    container_name: instalflow-api

    restart: unless-stopped

    command: sh docker/start-api.sh

    ports:
      - "10000:10000"

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 10000

    healthcheck:
      # test: ["CMD", "wget", "--spider", "-q", "http://localhost:10000/health"]
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    mem_limit: 350m

    networks:
      - instalflow-network

  # =========================================================
  # WORKERS
  # =========================================================
  workers:
    image: instalflow-backend-service:latest

    container_name: instalflow-workers

    restart: unless-stopped

    command: sh docker/start-workers.sh

    env_file:
      - .env

    environment:
      NODE_ENV: production

    depends_on:
      - api

    mem_limit: 350m

    networks:
      - instalflow-network

  # =========================================================
  # SCHEDULERS
  # =========================================================
  schedulers:
    image: instalflow-backend-service:latest

    container_name: instalflow-schedulers

    restart: unless-stopped

    command: sh docker/start-schedulers.sh

    env_file:
      - .env

    environment:
      NODE_ENV: production

    depends_on:
      - api

    mem_limit: 200m

    networks:
      - instalflow-network

networks:
  instalflow-network:
    driver: bridge

