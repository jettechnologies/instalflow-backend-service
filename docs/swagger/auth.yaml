paths:
  /auth/register:
    post:
      summary: Register New Customer
      description: Registers a customer account. Supports optional affiliate attribution via referredByMarketerId.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  minLength: 2
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                referredByMarketerId:
                  type: string
                  format: uuid
                  description: Optional ID of the marketer who referred the customer.
      responses:
        201:
          description: User registered successfully
        400:
          description: Invalid referral ID
        409:
          description: Email already in use

