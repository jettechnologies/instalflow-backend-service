tags:
  - name: Product Catalog
    description: Endpoints for managing products, categories, variants, and dynamic installment plans.

paths:
  /products:
    get:
      summary: List Products with Installment Breakdowns (Offset Paginated)
      tags: [Product Catalog]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number for offset pagination.
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Max number of products to return per page.
        - in: query
          name: categorySlug
          schema:
            type: string
          description: Filter products matching a specific category slug.
        - in: query
          name: categoryName
          schema:
            type: string
          description: Filter products matching a specific category name.
      responses:
        "200":
          description: Offset paginated list of products.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: string
                          format: uuid
                        name:
                          type: string
                        slug:
                          type: string
                        price:
                          type: number
                        stockQuantity:
                          type: integer
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer

    post:
      summary: Create a Product (Admin/Company only)
      tags: [Product Catalog]
      security:
        - bearerAuth: []
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, categoryId]
              properties:
                name:
                  type: string
                  example: Amazing Flagship Phone
                description:
                  type: string
                  example: Premium high-end flagship phone.
                categoryId:
                  type: string
                  format: uuid
                  example: 8c9f294b-8e85-4797-bdf5-6d0a3ecaa25c
                price:
                  type: number
                  default: 0
                  example: 999.99
                minPrice:
                  type: number
                  example: 899.99
                maxPrice:
                  type: number
                  example: 1099.99
                commissionRate:
                  type: number
                  default: 0
                  example: 5.5
                stockQuantity:
                  type: integer
                  default: 0
                  example: 100
                images:
                  type: array
                  items:
                    type: object
                    required: [imageUrl]
                    properties:
                      imageUrl:
                        type: string
                        example: https://res.cloudinary.com/demo/image/upload/phone.jpg
                      altText:
                        type: string
                        example: Front display view of the phone
                      isPrimary:
                        type: boolean
                        default: false
                      sortOrder:
                        type: integer
                        default: 0
                variants:
                  type: array
                  items:
                    type: object
                    required: [sku, price]
                    properties:
                      sku:
                        type: string
                        example: PH-AMZ-256
                      size:
                        type: string
                        example: 256GB
                      color:
                        type: array
                        items:
                          type: string
                        example: ["Space Black"]
                      images:
                        type: array
                        items:
                          type: string
                        example: []
                      stockQuantity:
                        type: integer
                        example: 50
                      price:
                        type: number
                        example: 999.99
                installmentPlans:
                  type: array
                  items:
                    type: object
                    required: [durationMonths]
                    properties:
                      durationMonths:
                        type: integer
                        example: 6
                      interestPercentage:
                        type: number
                        default: 0
                        example: 5.0
                      active:
                        type: boolean
                        default: true
      responses:
        "201":
          description: Product created successfully

  /products/cursor:
    get:
      summary: List Products with Installment Breakdowns (Cursor Paginated)
      tags: [Product Catalog]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: Base64 or ID cursor string for pagination.
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Max number of products to return.
        - in: query
          name: categorySlug
          schema:
            type: string
          description: Filter matching a specific category slug.
        - in: query
          name: categoryName
          schema:
            type: string
          description: Filter matching a specific category name.
      responses:
        "200":
          description: Cursor-paginated list of products.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                  meta:
                    type: object
                    properties:
                      nextCursor:
                        type: string
                        example: cursor_id_string
                      hasMore:
                        type: boolean
                        example: true

  /products/search:
    get:
      summary: Full-Text GIN Index Search Products
      tags: [Product Catalog]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          required: true
          schema:
            type: string
          description: Query string search term matching product titles/description.
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Ranked search results returned.

  /products/{id}:
    get:
      summary: Get Product by ID
      tags: [Product Catalog]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the product
      responses:
        "200":
          description: Product details retrieved

    patch:
      summary: Update a Product (Admin/Company only)
      tags: [Product Catalog]
      security:
        - bearerAuth: []
        - csrfToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                price: { type: number }
                active: { type: boolean }
      responses:
        "200":
          description: Product updated

    delete:
      summary: Soft Delete a Product
      tags: [Product Catalog]
      security:
        - bearerAuth: []
        - csrfToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product deleted
