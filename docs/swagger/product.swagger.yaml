tags:
  - name: Product Catalog
    description: Endpoints for managing products, variants, and dynamic installment plans.

paths:
  /products:
    get:
      summary: List Products with Installment Breakdowns
      tags: [Product Catalog]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: A list of products with their variants and calculated monthly installment breakdowns.

    post:
      summary: Create a Product (Admin/Company only)
      tags: [Product Catalog]
      security:
        - bearerAuth: []
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                categoryId: { type: string }
                price: { type: number, default: 0 }
                minPrice: { type: number }
                maxPrice: { type: number }
                commissionRate: { type: number, default: 0 }
                stockQuantity: { type: integer, default: 0 }
                variants:
                  type: array
                  items:
                    type: object
                    required: [sku, price]
                    properties:
                      sku: { type: string }
                      size: { type: string }
                      color: { type: array, items: { type: string } }
                      images: { type: array, items: { type: string } }
                      stockQuantity: { type: integer }
                      price: { type: number }
                installmentPlans:
                  type: array
                  items:
                    type: object
                    required: [durationMonths]
                    properties:
                      durationMonths:
                        { type: integer, description: "e.g. 3, 6, 12" }
                      interestPercentage:
                        {
                          type: number,
                          default: 0,
                          description: "e.g. 5.5 for 5.5%",
                        }
                      active: { type: boolean, default: true }
      responses:
        "201":
          description: Product created successfully

  /products/{id}:
    get:
      summary: Get Product by ID
      tags: [Product Catalog]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The UUID of the product
      responses:
        "200":
          description: Product details retrieved

    patch:
      summary: Update a Product (Admin/Company only)
      tags: [Product Catalog]
      security:
        - bearerAuth: []
        - csrfToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                price: { type: number }
                active: { type: boolean }
      responses:
        "200":
          description: Product updated

    delete:
      summary: Soft Delete a Product
      tags: [Product Catalog]
      security:
        - bearerAuth: []
        - csrfToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product deleted
