tags:
  - name: Company Administration
    description: Endpoints for company owners to manage admins, marketers, and maker-checker approvals.

paths:
  /company/admins:
    get:
      summary: Retrieve all associated admins
      description: Returns all admins belonging to the authenticated company with pagination support.
      tags: [Company Administration]
      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1

        - in: query
          name: limit
          schema:
            type: integer
            default: 10

        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc

      responses:
        "200":
          description: Admins retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Admins retrieved successfully

                  data:
                    type: object
                    properties:
                      admins:
                        type: array
                        items:
                          $ref: "#/components/schemas/AdminSummary"

                      pagination:
                        $ref: "#/components/schemas/Pagination"

    post:
      summary: Create an Admin User
      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string

                email:
                  type: string
                  format: email

      responses:
        "201":
          description: Admin created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

                  message:
                    type: string
                    example: Admin created successfully

                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/AdminSummary"

                      tempPassword:
                        type: string

                      instructions:
                        type: string

  /company/admins/{adminId}:
    get:
      summary: View single admin details
      description: Retrieves a single admin and all related statistics.
      tags: [Company Administration]
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: adminId
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Admin details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

                  message:
                    type: string
                    example: Admin details retrieved successfully

                  data:
                    $ref: "#/components/schemas/AdminDetails"

        "404":
          description: Admin not found

    delete:
      summary: Soft Delete an Admin
      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []

      parameters:
        - in: path
          name: adminId
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Admin deleted successfully

  /company/admins/{adminId}/status:
    patch:
      summary: Toggle an Admin's Active Status
      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []

      parameters:
        - in: path
          name: adminId
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - active
              properties:
                active:
                  type: boolean

      responses:
        "200":
          description: Admin status updated successfully

  /company/admins/{adminId}/marketers:
    get:
      summary: Retrieve marketers managed by an admin
      description: Returns all marketers created by the specified admin.
      tags: [Company Administration]
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: adminId
          required: true
          schema:
            type: string
            format: uuid

        - in: query
          name: page
          schema:
            type: integer
            default: 1

        - in: query
          name: limit
          schema:
            type: integer
            default: 10

        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc

      responses:
        "200":
          description: Marketers fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

                  message:
                    type: string
                    example: Marketers fetched successfully

                  data:
                    type: object
                    properties:
                      marketers:
                        type: array
                        items:
                          $ref: "#/components/schemas/MarketerSummary"

                      pagination:
                        $ref: "#/components/schemas/Pagination"

        "403":
          description: You are not allowed to access these marketers

        "404":
          description: Admin not found

  /company/approvals:
    get:
      summary: List Pending Approvals
      tags: [Company Administration]
      security:
        - bearerAuth: []

      responses:
        "200":
          description: List of pending approval requests

  /company/approvals/{requestId}:
    post:
      summary: Handle Maker-Checker Approval Request
      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []

      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - APPROVED
                    - REJECTED

      responses:
        "200":
          description: Request handled successfully

    /company/marketers/{marketerId}/toggle-status:
    patch:
      summary: Toggle Marketer Active Status
      description: |
        Directly activate or suspend a marketer account created by the authenticated company user.
        The marketer must:
          - Belong to the same company
          - Have role MARKETER
          - Be created by the authenticated company user
          - Not be soft deleted
      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []

      parameters:
        - in: path
          name: marketerId
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Marketer status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Marketer suspended successfully

                  data:
                    type: object
                    properties:
                      active:
                        type: boolean
                        example: false

        "404":
          description: Marketer not found or permission denied

        "401":
          description: Unauthorized

  /company/marketers/{marketerId}:
    delete:
      summary: Soft Delete Marketer
      description: |
        Permanently disables a marketer account through soft deletion.
        The marketer must:
          - Belong to the same company
          - Have role MARKETER
          - Be created by the authenticated company user
          - Not already be deleted

        This operation:
          - Sets deletedAt
          - Sets active = false
          - Revokes all active sessions
          - Sends notifications and email alerts

      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []

      parameters:
        - in: path
          name: marketerId
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Marketer deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Marketer deleted successfully

        "404":
          description: Marketer not found or permission denied

        "401":
          description: Unauthorized

components:
  schemas:
    AdminSummary:
      type: object
      properties:
        userId:
          type: string

        name:
          type: string

        email:
          type: string
          format: email

        role:
          type: string
          example: ADMIN

        active:
          type: boolean

        marketerCount:
          type: integer
          example: 12

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    MarketerSummary:
      type: object
      properties:
        userId:
          type: string

        name:
          type: string

        email:
          type: string
          format: email

        role:
          type: string
          example: MARKETER

        active:
          type: boolean

        referralCode:
          type: string
          nullable: true

        referredCustomerCount:
          type: integer
          example: 25

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    AdminDetails:
      type: object
      properties:
        userId:
          type: string

        name:
          type: string

        email:
          type: string
          format: email

        role:
          type: string
          example: ADMIN

        active:
          type: boolean

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

        createdUsers:
          type: array
          items:
            $ref: "#/components/schemas/MarketerSummary"

        stats:
          type: object
          properties:
            marketerCount:
              type: integer
              example: 8

            customerCount:
              type: integer
              example: 120

            financingContractCount:
              type: integer
              example: 95

            totalCommissionGenerated:
              type: number
              example: 450000

            totalCommissionRecords:
              type: integer
              example: 180

    Pagination:
      type: object
      properties:
        total:
          type: integer

        totalPages:
          type: integer

        currentPage:
          type: integer

        limit:
          type: integer

        hasNextPage:
          type: boolean

        hasPreviousPage:
          type: boolean

    MarketerStatusResponse:
      type: object
      properties:
        active:
          type: boolean
          example: false

    SuccessMessageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

        message:
          type: string
          example: Operation completed successfully
