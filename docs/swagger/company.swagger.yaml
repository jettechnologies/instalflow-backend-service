tags:
  - name: Company Administration
    description: Endpoints for company owners to manage admins and handle maker-checker approvals.

paths:
  /company/admins:
    post:
      summary: Create an Admin User
      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
      responses:
        "201":
          description: Admin created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }
                  message:
                    { type: string, example: "Admin created successfully" }
                  data:
                    type: object
                    properties:
                      user: { type: object }
                      tempPassword: { type: string }
                      instructions: { type: string }

  /company/admins/{id}/status:
    patch:
      summary: Toggle an Admin's Active Status
      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID of the admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
      responses:
        "200":
          description: Admin status updated

  /company/admins/{id}:
    delete:
      summary: Soft Delete an Admin
      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID of the admin
      responses:
        "200":
          description: Admin deleted successfully

  /company/approvals:
    get:
      summary: List Pending Approvals
      tags: [Company Administration]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of pending approval requests

  /company/approvals/{requestId}:
    post:
      summary: Handle Maker-Checker Approval Request
      tags: [Company Administration]
      security:
        - bearerAuth: []
        - csrfToken: []
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [APPROVED, REJECTED]
      responses:
        "200":
          description: Request handled successfully
