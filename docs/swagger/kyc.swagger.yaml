paths:
  /kyc/register:
    post:
      tags:
        - KYC & Onboarding
      summary: Start Referral Onboarding (provisional session)
      description: |
        Creates or resumes a provisional, expiring `OnboardingSession` for the referred
        customer. **No `User` account is created yet** — identity is only materialized once
        the KYC application is fully approved (maker + checker). Re-calling with the same
        email and a live session returns a fresh token for the same session and extends its
        expiry, so a dropped connection mid-flow is always recoverable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - referredByCode
              properties:
                name:
                  type: string
                  example: Alice Customer
                email:
                  type: string
                  format: email
                  example: alice.customer@example.com
                password:
                  type: string
                  format: password
                  example: securepassword123
                referredByCode:
                  type: string
                  example: IFL-REF-JOHNMARKETER-A8786D
      responses:
        "201":
          description: Referral accepted. Use the onboardingToken to call POST /kyc/submit. A User is only created on full KYC approval.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Referral accepted. Use the onboardingToken to complete your KYC application.
                  onboardingToken:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "400":
          description: Invalid inputs or invalid referral code.
        "409":
          description: Email is already in use by an existing User.

  /kyc/referral-link:
    post:
      tags:
        - KYC & Onboarding
      summary: Generate Shareable Referral Link
      description: |
        Generates a unique, social-ready referral onboarding link for a Marketer.
        **Authorization:** Requires access token with role `MARKETER`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productSlug
              properties:
                productSlug:
                  type: string
                  example: amazing-flagship-phone-6019
                variantId:
                  type: string
                  format: uuid
                  example: 8c9f294b-8e85-4797-bdf5-6d0a3ecaa25c
      responses:
        "200":
          description: Link generated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  referralCode:
                    type: string
                    example: IFL-REF-JOHNMARKETER-A8786D
                  referralLink:
                    type: string
                    example: http://localhost:5173/invite?ref=IFL-REF-JOHNMARKETER-A8786D&product=amazing-flagship-phone-6019&variant=8c9f294b-8e85-4797-bdf5-6d0a3ecaa25c
        "401":
          description: Unauthorized session or invalid role.

  /kyc/submit:
    post:
      tags:
        - KYC & Onboarding
      summary: Submit Installment Eligibility Application (KYC)
      description: |
        Uploads the customer's bank statement PDF and submits identity parameters for the
        mock KYC check. The customer does not yet exist as a `User`; the application is
        anchored to the provisional `OnboardingSession` created by `POST /kyc/register`.
        **Authorization:** Requires the short-lived `onboardingToken` (now scoped to the
        session, valid 24h) as `Authorization: Bearer <onboardingToken>`.
        **Constraints:** Bank statement file size must be <= 10MB and format must be strictly `.pdf`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - productId
                - variantId
                - installmentPlanId
                - idType
                - idNumber
                - bankStatement
              properties:
                productId:
                  type: string
                  format: uuid
                  example: c9f294b8-8e85-4797-bdf5-6d0a3ecaa25c
                variantId:
                  type: string
                  format: uuid
                  example: 8c9f294b-8e85-4797-bdf5-6d0a3ecaa25c
                installmentPlanId:
                  type: string
                  format: uuid
                  example: d20f9a23-bc9a-4c2c-80fe-9a6e5ee9b0f7
                idType:
                  type: string
                  enum: [NIN, BVN, PASSPORT]
                  example: NIN
                idNumber:
                  type: string
                  example: "12039129031"
                bankStatement:
                  type: string
                  format: binary
                  description: Bank statement PDF document (<= 10MB)
      responses:
        "201":
          description: Application submitted successfully and is now under review.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Installment application submitted successfully. It is now under review.
                  applicationId:
                    type: string
                    format: uuid
                    example: 671c2e10-7e63-40c5-9ea2-2941b3c9c328
                  status:
                    type: string
                    example: PENDING
        "400":
          description: PDF upload fails size/type constraint, or the onboarding session has expired.
        "401":
          description: Onboarding token missing, expired, or invalid.
        "404":
          description: Onboarding session not found (e.g. already expired and swept). Re-register to obtain a new session.
        "409":
          description: An existing PENDING/APPROVED KYC application is already attached to this session.

  /kyc/applications/{id}/approve:
    post:
      tags:
        - KYC & Onboarding
      summary: Maker-Checker KYC Application Approval
      description: |
        Approves a pending KYC application. Requires distinct approvals from BOTH the referring Marketer and their associated creator Admin to promote status to APPROVED.
        **Authorization:** Restricted to logged-in Marketers or Admins.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The KYC Application UUID.
          schema:
            type: string
            format: uuid
            example: 671c2e10-7e63-40c5-9ea2-2941b3c9c328
      responses:
        "200":
          description: Approval signature recorded successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: KYC Application fully approved by both Marketer and Admin.
                  status:
                    type: string
                    example: APPROVED
        "400":
          description: Application already processed.
        "401":
          description: Unauthorized session or invalid checker relationship.
        "404":
          description: KYC Application not found.

  /kyc/applications/{id}/reject:
    post:
      tags:
        - KYC & Onboarding
      summary: Reject KYC Application
      description: |
        Rejects a pending KYC application. Requires only the associated creator Admin's signature with a detailed reason.
        **Authorization:** Restricted to logged-in Admins.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The KYC Application UUID.
          schema:
            type: string
            format: uuid
            example: 671c2e10-7e63-40c5-9ea2-2941b3c9c328
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  example: Bank statement name does not match user account profile.
      responses:
        "200":
          description: Application rejected successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: KYC Application rejected successfully.
                  status:
                    type: string
                    example: REJECTED
        "401":
          description: Unauthorized or not the associated Admin.
        "404":
          description: KYC Application not found.

  /kyc/applications/{id}/document:
    get:
      tags:
        - KYC & Onboarding
      summary: Retrieve Short-Lived Secure Signed Document URL
      description: |
        Generates a secure, short-lived signed access link (expires after 15 minutes) for a private Cloudinary document.
        **Authorization:** Restricted to authorized Marketers and Admins in lead scope.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The KYC Application UUID.
          schema:
            type: string
            format: uuid
            example: 671c2e10-7e63-40c5-9ea2-2941b3c9c328
      responses:
        "200":
          description: Signed URL generated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  signedUrl:
                    type: string
                    example: https://res.cloudinary.com/demo/image/upload/s--abc--/v12345/documents/dummy.pdf
                  expiresIn:
                    type: string
                    example: 15 minutes
        "401":
          description: Unauthorized session.
        "404":
          description: Document has been purged or application not found.

  /kyc/applications:
    get:
      tags:
        - KYC & Onboarding
      summary: List KYC Applications (Paginated)
      description: |
        Returns a paginated list of KYC applications, automatically scoped to the
        caller's role:
        - **Marketer**: only applications they referred.
        - **Admin**: only applications referred by marketers they created.
        - **Company**: only applications belonging to customers of their company.
        - **Super Admin**: all applications.
        Supports filtering by `status` (PENDING | APPROVED | REJECTED), a specific
        `marketerId`, and a free-text `search` over the customer's name/email and
        the referring marketer's name (case-insensitive).
        **Authorization:** Restricted to logged-in Admins, Companies, Marketers and Super Admins.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          description: Number of applications per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
        - name: sortOrder
          in: query
          required: false
          description: Sort direction by creation date.
          schema:
            type: string
            enum: [asc, desc]
            default: desc
            example: desc
        - name: status
          in: query
          required: false
          description: Filter by application status.
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
            example: PENDING
        - name: marketerId
          in: query
          required: false
          description: Filter by referring marketer UUID (Admin/Company/Super Admin only). Marketers are always scoped to themselves.
          schema:
            type: string
            format: uuid
            example: 8c9f294b-8e85-4797-bdf5-6d0a3ecaa25c
        - name: search
          in: query
          required: false
          description: Case-insensitive search across customer name, customer email and referring marketer name.
          schema:
            type: string
            example: alice
      responses:
        "200":
          description: Paginated list of KYC applications.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: KYC applications retrieved successfully
                  data:
                    type: object
                    properties:
                      applications:
                        type: array
                        items:
                          $ref: "#/components/schemas/KycApplication"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized session or invalid role.

  /kyc/applications/{id}:
    get:
      tags:
        - KYC & Onboarding
      summary: Get KYC Application by ID
      description: |
        Retrieves a single KYC application and its related customer, product,
        financing contract and retained document metadata by the application UUID.
        **Authorization:** Restricted to authorized Marketers and Admins in lead scope.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The KYC Application UUID.
          schema:
            type: string
            format: uuid
            example: 671c2e10-7e63-40c5-9ea2-2941b3c9c328
      responses:
        "200":
          description: KYC application retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: KYC application retrieved successfully
                  data:
                    $ref: "#/components/schemas/KycApplication"
        "401":
          description: Unauthorized session or invalid checker relationship.
        "404":
          description: KYC Application not found.

components:
  schemas:
    Pagination:
      type: object
      properties:
        total:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 5
        currentPage:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        hasNextPage:
          type: boolean
          example: true
        hasPreviousPage:
          type: boolean
          example: false
    KycApplication:
      type: object
      properties:
        kycApplicationId:
          type: string
          format: uuid
          example: 671c2e10-7e63-40c5-9ea2-2941b3c9c328
        userId:
          type: string
          format: uuid
          example: c9f294b8-8e85-4797-bdf5-6d0a3ecaa25c
        productId:
          type: string
          format: uuid
          example: c9f294b8-8e85-4797-bdf5-6d0a3ecaa25c
        variantId:
          type: string
          format: uuid
          example: 8c9f294b-8e85-4797-bdf5-6d0a3ecaa25c
        installmentPlanId:
          type: string
          format: uuid
          example: d20f9a23-bc9a-4c2c-80fe-9a6e5ee9b0f7
        idType:
          type: string
          example: NIN
        idNumber:
          type: string
          example: "12039129031"
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
          example: PENDING
        marketerApproved:
          type: boolean
          example: false
        adminApproved:
          type: boolean
          example: false
        rejectionReason:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            userId:
              type: string
              format: uuid
            name:
              type: string
              example: Alice Customer
            email:
              type: string
              format: email
              example: alice.customer@example.com
            referredByMarketerId:
              type: string
              format: uuid
              nullable: true
            referredByMarketer:
              type: object
              nullable: true
              properties:
                name:
                  type: string
                  nullable: true
                  example: John Marketer
                email:
                  type: string
                  format: email
                  example: marketer@example.com
        product:
          type: object
          properties:
            productId:
              type: string
              format: uuid
            name:
              type: string
              example: Amazing Flagship Phone
            slug:
              type: string
              example: amazing-flagship-phone-6019
        financingContract:
          type: object
          nullable: true
          properties:
            contractId:
              type: string
              format: uuid
            status:
              type: string
              example: PENDING_ACTIVATION
            totalFinanced:
              type: number
              example: 540000
        kycDocumentAssets:
          type: array
          items:
            type: object
            properties:
              assetId:
                type: string
                format: uuid
              fileSize:
                type: integer
                example: 245760
              mimeType:
                type: string
                example: application/pdf
              scheduledDeletionAt:
                type: string
                format: date-time
                nullable: true
