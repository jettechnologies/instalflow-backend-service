tags:
  - name: Admin Operations
    description: Endpoints for admins to manage marketers via maker-checker approvals.

paths:
  /admin/marketers:
    get:
      summary: Get all marketers created by the authenticated admin
      tags: [Admin Operations]

      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1

        - in: query
          name: limit
          schema:
            type: integer
            default: 10

        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: desc

      responses:
        "200":
          description: Marketers fetched successfully
          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Marketers fetched successfully

                  data:
                    type: object

                    properties:
                      marketers:
                        type: array
                        items:
                          $ref: "#/components/schemas/MarketerSummary"

                      pagination:
                        $ref: "#/components/schemas/Pagination"

  /admin/marketers/{marketerId}:
    get:
      summary: Get marketer details
      description: |
        Retrieves detailed information about a marketer including:

        - Profile information
        - Referral statistics
        - Financing performance
        - Commission statistics
        - Payout history
        - Bank accounts
        - Recently referred customers

      tags: [Admin Operations]

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: marketerId
          required: true
          schema:
            type: string
            format: uuid

      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  example: This marketer account need closing!

      responses:
        "200":
          description: Marketer details retrieved successfully

          content:
            application/json:
              schema:
                type: object

                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Marketer details retrieved successfully

                  data:
                    $ref: "#/components/schemas/MarketerDetails"

        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "404":
          description: Marketer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/marketers/{id}/request-toggle:
    post:
      summary: Request to toggle a marketer's active status
      tags: [Admin Operations]

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  example: This marketer account need closing!

      responses:
        "201":
          description: Toggle request submitted for approval

  /admin/marketers/{id}/request-delete:
    post:
      summary: Request to soft delete a marketer
      tags: [Admin Operations]

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "201":
          description: Delete request submitted for approval

components:
  schemas:
    MarketerSummary:
      type: object

      properties:
        userId:
          type: string
          format: uuid

        name:
          type: string
          nullable: true
          example: John Doe

        email:
          type: string
          format: email
          example: john@example.com

        role:
          type: string
          example: MARKETER

        active:
          type: boolean
          example: true

        referralCode:
          type: string
          nullable: true
          example: REF12345

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

        _count:
          type: object

          properties:
            referredUsers:
              type: integer
              example: 15

    MarketerCreator:
      type: object

      properties:
        userId:
          type: string
          format: uuid

        name:
          type: string
          example: Company Admin

        email:
          type: string
          format: email

        role:
          type: string
          example: ADMIN

    MarketerBankAccount:
      type: object

      properties:
        accountId:
          type: string
          format: uuid

        bankName:
          type: string
          example: Access Bank

        accountName:
          type: string
          example: John Doe

        accountNumber:
          type: string
          example: "0123456789"

        isPrimary:
          type: boolean
          example: true

        isVerified:
          type: boolean
          example: true

    MarketerStats:
      type: object

      properties:
        referredCustomers:
          type: integer
          example: 45

        approvedKycApplications:
          type: integer
          example: 31

        financingContracts:
          type: integer
          example: 22

        totalFinancedVolume:
          type: number
          example: 12500000

        totalCommissionGenerated:
          type: number
          example: 450000

        totalCommissionRecords:
          type: integer
          example: 85

        totalPayoutRequested:
          type: number
          example: 250000

        totalPayoutRequests:
          type: integer
          example: 8

    ReferredCustomer:
      type: object

      properties:
        userId:
          type: string
          format: uuid

        name:
          type: string
          nullable: true

        email:
          type: string
          format: email

        createdAt:
          type: string
          format: date-time

    RecentPayoutRequest:
      type: object

      properties:
        payoutId:
          type: string
          format: uuid

        amount:
          type: number
          example: 50000

        status:
          type: string
          enum:
            - PENDING_ADMIN_APPROVAL
            - PENDING_COMPANY_APPROVAL
            - APPROVED
            - REJECTED
            - TRANSFER_PENDING
            - PAID
            - FAILED

        requestedAt:
          type: string
          format: date-time

    MarketerDetails:
      type: object

      properties:
        userId:
          type: string
          format: uuid

        name:
          type: string
          nullable: true

        email:
          type: string
          format: email

        role:
          type: string
          example: MARKETER

        active:
          type: boolean

        referralCode:
          type: string
          nullable: true

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

        creator:
          $ref: "#/components/schemas/MarketerCreator"

        marketerBankAccounts:
          type: array
          items:
            $ref: "#/components/schemas/MarketerBankAccount"

        stats:
          $ref: "#/components/schemas/MarketerStats"

        recentCustomers:
          type: array
          items:
            $ref: "#/components/schemas/ReferredCustomer"

        recentPayoutRequests:
          type: array
          items:
            $ref: "#/components/schemas/RecentPayoutRequest"

    Pagination:
      type: object

      properties:
        total:
          type: integer
          example: 100

        totalPages:
          type: integer
          example: 10

        currentPage:
          type: integer
          example: 1

        limit:
          type: integer
          example: 10

        hasNextPage:
          type: boolean
          example: true

        hasPreviousPage:
          type: boolean
          example: false

    ErrorResponse:
      type: object

      properties:
        success:
          type: boolean
          example: false

        message:
          type: string

        statusCode:
          type: integer
          example: 404

