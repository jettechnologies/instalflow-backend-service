openapi: 3.0.0

info:
  title: Commission API
  version: 1.0.0

paths:
  /commissions/all-time:
    get:
      summary: Get all commissions
      tags: [Commissions]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All commissions fetched

  /commissions/per-customer:
    get:
      summary: Get commissions grouped by customer
      tags: [Commissions]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Commissions grouped by customer fetched

  /commissions/per-product:
    get:
      summary: Get commissions grouped by product
      tags: [Commissions]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Commissions grouped by product fetched

  /commissions/request-payout:
    post:
      summary: Request commission payout
      tags: [Commissions]
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  example: 50000

      responses:
        "201":
          description: Payout request created

  /commissions/payouts:
    get:
      summary: Get payout requests
      tags: [Commission Payouts]
      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - PENDING_ADMIN_APPROVAL
              - PENDING_COMPANY_APPROVAL
              - APPROVED
              - REJECTED
              - TRANSFER_INITIATED
              - PAID
              - TRANSFER_FAILED
              - TRANSFER_REVERSED

        - in: query
          name: page
          schema:
            type: integer
            default: 1

        - in: query
          name: limit
          schema:
            type: integer
            default: 20

      responses:
        "200":
          description: Payout requests fetched successfully

  /commissions/payouts/{id}:
    get:
      summary: Get payout request details
      tags: [Commission Payouts]
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          description: Payout ID
          schema:
            type: string

      responses:
        "200":
          description: Payout details fetched successfully

        "404":
          description: Payout request not found

  /commissions/payouts/{id}/admin-approve:
    post:
      summary: Admin approves payout request
      tags: [Commission Payouts]
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Admin approval successful

  /commissions/payouts/{id}/company-approve:
    post:
      summary: Company approves payout request
      tags: [Commission Payouts]
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Company approval successful

  /commissions/payouts/{id}/initiate-transfer:
    post:
      summary: Initiate payout transfer
      tags: [Commission Payouts]
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true
          description: Payout ID
          schema:
            type: string

      responses:
        "200":
          description: Transfer queued successfully

        "400":
          description: Invalid payout status

        "403":
          description: Unauthorized company access

        "404":
          description: Payout request not found

  /commissions/payouts/initiate-bulk-transfer:
    post:
      summary: Initiate bulk payout transfers
      tags: [Commission Payouts]
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payoutIds

              properties:
                payoutIds:
                  type: array
                  items:
                    type: string
                  example:
                    - payout_123
                    - payout_456
                    - payout_789

      responses:
        "200":
          description: Bulk transfer processing started

        "400":
          description: Validation failed

components:
  schemas:
    PayoutStatus:
      type: string
      enum:
        - PENDING_ADMIN_APPROVAL
        - PENDING_COMPANY_APPROVAL
        - APPROVED
        - REJECTED
        - TRANSFER_INITIATED
        - PAID
        - TRANSFER_FAILED
        - TRANSFER_REVERSED

    CommissionStatus:
      type: string
      enum:
        - ACTIVE
        - PARTIALLY_RESERVED
        - RESERVED
        - PAID
        - FROZEN

    CommissionAllocationStatus:
      type: string
      enum:
        - RESERVED
        - PAID
        - RELEASED

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
