tags:
  - name: Installment Management
    description: Financing contract installments, payment processing, and progress tracking

paths:
  /installments/customer:
    get:
      tags:
        - Installment Management
      summary: Retrieve authenticated customer installments
      description: >
        Returns all installments belonging to the authenticated customer
        with pagination support, financing contract details,
        payment history, and related financed product information.
      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
          description: Current pagination page

        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 10
          description: Number of records per page

      responses:
        "200":
          description: Customer installments retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Installments retrieved successfully

                  data:
                    type: object
                    properties:
                      installments:
                        type: array
                        items:
                          allOf:
                            - $ref: "#/components/schemas/Installment"

                            - type: object
                              properties:
                                financingContract:
                                  type: object
                                  properties:
                                    contractId:
                                      type: string
                                      format: uuid

                                    totalFinanced:
                                      type: number
                                      example: 450000

                                    status:
                                      type: string
                                      enum:
                                        - PENDING_ACTIVATION
                                        - ACTIVE
                                        - COMPLETED
                                        - DEFAULTED
                                        - CANCELLED
                                        - REJECTED
                                        - RESTRUCTURED
                                        - WRITTEN_OFF

                                    kycApplication:
                                      type: object
                                      properties:
                                        product:
                                          type: object
                                          properties:
                                            productId:
                                              type: string
                                              format: uuid

                                            name:
                                              type: string
                                              example: iPhone 15 Pro Max

                                            slug:
                                              type: string
                                              example: iphone-15-pro-max

                                        user:
                                          type: object
                                          properties:
                                            userId:
                                              type: string
                                              format: uuid

                                            name:
                                              type: string
                                              example: John Doe

                                            email:
                                              type: string
                                              format: email

                                payments:
                                  type: array
                                  items:
                                    $ref: "#/components/schemas/Payment"

                      pagination:
                        $ref: "#/components/schemas/Pagination"

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /installments/{contractId}:
    get:
      tags:
        - Installment Management
      summary: Retrieve customer installment plan
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: contractId
          required: true
          description: Financing Contract ID
          schema:
            type: string

      responses:
        "200":
          description: Customer installment plan retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Customer installment plan retrieved successfully.

                  data:
                    type: object
                    properties:
                      contract:
                        $ref: "#/components/schemas/FinancingContract"

                      installments:
                        type: array
                        items:
                          $ref: "#/components/schemas/Installment"

                      overdueStatus:
                        type: string
                        enum:
                          - NORMAL
                          - OVERDUE
                          - PAID
                        example: NORMAL

  /installments/{contractId}/products:
    get:
      tags:
        - Installment Management
      summary: Retrieve financed products for a contract
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: contractId
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Financed products retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Financed products retrieved successfully

                  data:
                    type: object
                    properties:
                      products:
                        type: array
                        items:
                          $ref: "#/components/schemas/FinancedProduct"

  /installments/{contractId}/progress:
    get:
      tags:
        - Installment Management
      summary: Retrieve contract payment progress
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: contractId
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Contract payment progress retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Contract payment progress retrieved successfully

                  data:
                    type: object
                    properties:
                      percentagePaid:
                        type: number
                        example: 65.5

                      totalPaid:
                        type: number
                        example: 250000

                      totalFinanced:
                        type: number
                        example: 450000

  /installments/{installmentId}/pay:
    post:
      tags:
        - Installment Management
      summary: Initialize installment payment
      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: installmentId
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Payment initialized successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  message:
                    type: string
                    example: Payment initialized successfully

                  data:
                    type: object
                    properties:
                      authorizationUrl:
                        type: string
                        example: https://checkout.paystack.com/xxxxxx

                      accessCode:
                        type: string
                        example: ACCESS_CODE

                      reference:
                        type: string
                        example: PSK_xxx_123

                      amount:
                        type: number
                        example: 50000

                      installmentId:
                        type: string
                        format: uuid

                      dueDate:
                        type: string
                        format: date-time

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    FinancingContract:
      type: object
      properties:
        contractId:
          type: string
          format: uuid

        userId:
          type: string
          format: uuid

        productId:
          type: string
          format: uuid

        variantId:
          type: string
          format: uuid
          nullable: true

        kycApplicationId:
          type: string
          format: uuid

        approvedProductPrice:
          type: number
          example: 300000

        approvedInterestPercentage:
          type: number
          example: 15

        approvedDurationMonths:
          type: integer
          example: 6

        principal:
          type: number
          example: 300000

        interest:
          type: number
          example: 45000

        totalFinanced:
          type: number
          example: 345000

        status:
          type: string
          enum:
            - PENDING_ACTIVATION
            - ACTIVE
            - COMPLETED
            - DEFAULTED
            - CANCELLED
            - REJECTED
            - RESTRUCTURED
            - WRITTEN_OFF

        activatedAt:
          type: string
          format: date-time
          nullable: true

        completedAt:
          type: string
          format: date-time
          nullable: true

        defaultedAt:
          type: string
          format: date-time
          nullable: true

        cancelledAt:
          type: string
          format: date-time
          nullable: true

    Installment:
      type: object
      properties:
        installmentId:
          type: string
          format: uuid

        financingContractId:
          type: string
          format: uuid

        sequence:
          type: integer
          example: 1

        amount:
          type: number
          example: 50000

        dueDate:
          type: string
          format: date-time

        status:
          type: string
          enum:
            - PENDING
            - DUE
            - OVERDUE
            - DEFAULTED
            - PAID

        paidAt:
          type: string
          format: date-time
          nullable: true

        overdueAt:
          type: string
          format: date-time
          nullable: true

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    FinancedProduct:
      type: object
      properties:
        productId:
          type: string
          format: uuid

        name:
          type: string
          example: iPhone 15 Pro Max

        slug:
          type: string
          example: iphone-15-pro-max

        price:
          type: number
          example: 1200000

    Payment:
      type: object
      properties:
        paymentId:
          type: string
          format: uuid

        installmentId:
          type: string
          format: uuid

        amount:
          type: number
          example: 50000

        status:
          type: string
          enum:
            - PENDING
            - SUCCESS
            - FAILED

        providerReference:
          type: string
          nullable: true
          example: PSK_239393933

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        total:
          type: integer
          example: 24

        totalPages:
          type: integer
          example: 3

        currentPage:
          type: integer
          example: 1

        limit:
          type: integer
          example: 10

        hasNextPage:
          type: boolean
          example: true

        hasPreviousPage:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false

        message:
          type: string
          example: Unauthorized

        errorType:
          type: string
          enum:
            - Bad Request
            - Authentication Error
            - Authorization Error
            - Not Found
            - Conflict Error
            - Validation Error

        statusCode:
          type: integer
          example: 400
